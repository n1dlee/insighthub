<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Student Profile Page</title>
    <link rel="stylesheet" href="assets/css/styles.css" />
  </head>
  <body>
    <div id="loading-indicator"></div>
    <header>
      <div class="hcontainer">
        <a class="h1-style" href="/main"><h1>InsightHub</h1></a>
        <nav class="icon-bar">
          <div class="user-profile-wrapper" aria-haspopup="true">
            <div class="user-profile">
              <img
                id="profile-image"
                src="assets/icons/default-image.png"
                alt="User Profile"
                class="user-avatar-img"
              />
            </div>
            <ul class="dropdown-menu" role="menu" aria-hidden="true">
              <li role="menuitem">
                <h2 id="loading-student-name">Loading...</h2>
              </li>
              <li role="menuitem">
                <a href="/profile"><i class="profile-icon"></i> View Profile</a>
              </li>
              <li role="menuitem">
                <a href="/logout"><i class="logout-icon"></i> Log Out</a>
              </li>
            </ul>
          </div>
        </nav>
      </div>
    </header>

    <div class="profile-page-student">
      <div class="profile-content">
        <img
          class="background-image"
          src="assets/icons/background.png"
          alt="Background Image"
        />
        <div class="content-wrapper">
          <div class="content-columns">
            <div class="profile-sidebar">
              <div class="sidebar-content">
                <div class="profile-details">
                  <div class="profile-image-container">
                    <img
                      id="profile-image"
                      src="assets/icons/default-image.png"
                      alt="User Profile"
                      class="profile-image-img"
                    />
                  </div>
                  <div class="education-info">
                    <p>
                      <strong>Education:</strong>
                      <span id="student-education">Loading...</span>
                    </p>
                  </div>
                  <div class="divider"></div>
                  <div class="major-info">
                    <p>
                      <strong>Major:</strong>
                      <span id="student-major">Loading...</span>
                    </p>
                  </div>
                  <div class="statistics-info">
                    <p>
                      <strong>GPA:</strong>
                      <span id="student-gpa">Loading...</span>
                    </p>
                    <p>
                      <strong>SAT:</strong>
                      <span id="student-sat">Loading...</span>
                    </p>
                    <p>
                      <strong>IELTS:</strong>
                      <span id="student-ielts">Loading...</span>
                    </p>
                  </div>
                </div>
                <div class="vertical-divider"></div>
              </div>
            </div>

            <div class="main-column">
              <div class="main-content-wrapper">
                <div class="fullname-title">
                  <div class="name-address">
                    <h1 id="student-name">
                      Loading...
                      <a
                        href="/profile-change"
                        id="change-profile-link"
                        style="display: none"
                      >
                        <img
                          src="assets/icons/change-profile.png"
                          alt="Change Profile"
                          class="change-profile-icon"
                        />
                      </a>
                    </h1>
                    <h3 id="student-location">Loading...</h3>
                  </div>
                </div>
                <div class="description-column">
                  <div class="student-description" id="student-bio">
                    Loading...
                  </div>
                </div>
                <div class="achievements-section">
                  <div class="upper-container">
                    <div class="achievements-title">Achievements</div>
                    <button class="download-button">Download</button>
                  </div>
                  <div class="achievements-list">
                    <div class="student-description" id="student-achievements">
                      Loading...
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <script src="assets/js/profile.js"></script>
  </body>
</html>
