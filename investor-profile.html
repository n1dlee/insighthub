<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Investor Profile Page</title>
    <link rel="stylesheet" href="assets/css/styles.css" />
  </head>
  <body>
    <div id="loading-indicator"></div>
    <header>
      <div class="hcontainer">
        <a class="h1-style" href="/investor-main"><h1>InsightHub</h1></a>
        <nav class="icon-bar">
          <div class="user-profile-wrapper" aria-haspopup="true">
            <div class="user-profile">
              <img src="assets/icons/default-image.png" alt="User Profile" />
            </div>
            <ul class="dropdown-menu" role="menu" aria-hidden="true">
              <li role="menuitem">
                <h2 id="loading-investor-name">Loading...</h2>
              </li>
              <li role="menuitem">
                <a href="/investor-profile"
                  ><i class="profile-icon"></i> View Profile</a
                >
              </li>
              <li role="menuitem">
                <a href="/logout"><i class="logout-icon"></i> Log Out</a>
              </li>
            </ul>
          </div>
        </nav>
      </div>
    </header>

    <div class="profile-page-investor">
      <div class="profile-content">
        <img
          class="background-image"
          src="assets/icons/background.png"
          alt="Background Image"
        />
        <div class="content-wrapper">
          <div class="content-columns">
            <div class="profile-sidebar">
              <div class="sidebar-content">
                <div class="profile-details">
                  <div class="profile-image-container">
                    <img
                      id="profile-image"
                      src="assets/icons/default-image.png"
                      alt="Profile Image"
                      class="profile-image-img"
                    />
                  </div>
                  <div class="divider"></div>
                  <div class="work-history-info" id="work-history"></div>
                  <div class="work-experience-info" id="work-experience"></div>
                </div>

                <div class="achievements-section1">
                  <div class="upper-container">
                    <div class="achievements-title">Work History</div>
                    <button class="download-button1">Download</button>
                  </div>
                  <div
                    class="achievements-list"
                    id="work-history-container"
                  ></div>
                </div>
                <div class="vertical-divider"></div>
              </div>
            </div>
            <div id="error-message" style="display: none"></div>
            <div class="main-column">
              <div class="main-content-wrapper">
                <div class="fullname-title">
                  <div class="name-address">
                    <h1 id="name">
                      Loading...
                      <a
                        href="/investor-profile-change"
                        id="change-profile-link"
                        style="display: none"
                      >
                        <img
                          src="assets/icons/change-profile.png"
                          alt="Change Profile"
                          class="change-profile-icon"
                        />
                      </a>
                    </h1>
                    <h3 id="location">Loading...</h3>
                  </div>
                  <h2 class="profile-type" id="role">Investor</h2>
                </div>
                <div class="description-column">
                  <div class="investor-description" id="bio">Loading...</div>
                </div>
                <div class="achievements-section">
                  <div class="upper-container">
                    <div class="achievements-title">Work Experience</div>
                    <button class="download-button">Download</button>
                  </div>
                  <div
                    class="achievements-list"
                    id="work-experience-container"
                  ></div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <script src="assets/js/investor-profile.js"></script>
  </body>
</html>
