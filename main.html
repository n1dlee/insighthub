<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>InsightHub - Main</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Poppins:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="assets/css/styles.css" />
  </head>
  <body>
    <div id="loading-indicator"></div>
    <header>
      <div class="hcontainer">
        <a class="h1-style" href="/main"><h1>InsightHub</h1></a>
        <div class="chat_btn">
          <a href="/chat">
            <img id="chat_button" src="assets/icons/chat_btn.png" alt="Chat" />
          </a>
        </div>
        <nav class="icon-bar">
          <div class="user-profile-wrapper" aria-haspopup="true">
            <div class="user-profile">
              <img src="assets/icons/default-image.png" alt="User Profile" />
            </div>
            <ul class="dropdown-menu" role="menu" aria-hidden="true">
              <li role="menuitem">
                <h2 id="loading-student-name">Loading...</h2>
              </li>
              <li role="menuitem">
                <a href="/profile"><i class="profile-icon"></i> View Profile</a>
              </li>
              <li role="menuitem">
                <a href="/logout"><i class="logout-icon"></i> Log Out</a>
              </li>
            </ul>
          </div>
        </nav>
      </div>
    </header>

    <main class="main-container">
      <aside class="sidebar">
        <div class="filter-group">
          <label for="student-name-input">Student Name</label>
          <input
            type="text"
            id="student-name-input"
            placeholder="Search by name"
          />
        </div>
        <div class="filter-group">
          <label for="university">University</label>
          <select id="university">
            <option>University</option>
          </select>
        </div>
        <div class="filter-group">
          <label for="major">Major</label>
          <select id="major">
            <option>Major</option>
          </select>
        </div>
        <div class="filter-group">
          <label for="investment">Investment ($/year)</label>
          <select id="investment" name="investment">
            <option value="Investment">Investment Value</option>
            <option value="0-1000$">0$-1000$</option>
            <option value="1000$-5000$">1000$-5000$</option>
            <option value="5000$-10000$">5000$-10000$</option>
            <option value="10000$-20000$">10000$-20000$</option>
            <option value="20000$-30000$">20000$-30000$</option>
            <option value="30000$-50000$">30000$-50000$</option>
            <option value="50000$-80000$">50000$-80000$</option>
          </select>
        </div>
      </aside>

      <section class="student-list" id="student-list">
        <div id="loading-indicator" style="display: none">
          <div class="spinner"></div>
          Loading...
        </div>
        <!-- Student items will be dynamically inserted here -->
      </section>

      <div id="pagination-container" class="pagination">
        <!-- Pagination buttons will be dynamically inserted here -->
      </div>

      <div id="error-message" style="display: none; color: red"></div>
    </main>

    <footer class="qwerty">
      <p>&copy; 2024 InsightHub. All rights reserved.</p>
    </footer>

    <script src="assets/js/main.js"></script>
  </body>
</html>
