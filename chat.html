<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>InsightHub - Chat</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Poppins:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="assets/css/chat.css" />
    <style>
      #development-notice {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: rgba(0, 0, 0, 0.5);
        backdrop-filter: blur(5px);
        display: flex;
        justify-content: center;
        align-items: center;
        z-index: 9999;
      }
      #development-notice-content {
        background-color: #ffcc00;
        color: #000;
        padding: 20px;
        border-radius: 10px;
        text-align: center;
        font-size: 24px;
        font-weight: bold;
      }
      #go-back-button {
        margin-top: 30px;
        padding: 10px 20px;
        font-size: 18px;
        background-color: #000;
        color: #fff;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        transition: background-color 0.3s;
      }
      #go-back-button:hover {
        background-color: #333;
      }
      #go-back-button p {
        margin-top: 30px;
      }
    </style>
  </head>
  <body>
    <div id="development-notice">
      <div id="development-notice-content">
        <p>In Development Process</p>
        <a href="/main" id="go-back-button">Go to Main page</a>
      </div>
    </div>

    <header>
      <div class="hcontainer">
        <a class="h1-style" href="/main"><h1>InsightHub</h1></a>
        <div class="chat_btn">
          <a href="/chat">
            <img id="chat_button" src="assets/icons/chat_btn.png" />
          </a>
        </div>
        <nav class="icon-bar">
          <div class="user-profile-wrapper" aria-haspopup="true">
            <div class="user-profile">
              <img
                id="navbar-user-avatar"
                src="assets/icons/default-image.png"
                alt="User Profile"
              />
            </div>
            <ul class="dropdown-menu" role="menu" aria-hidden="true">
              <li role="menuitem">
                <h2 id="loading-student-name">Loading...</h2>
              </li>
              <li role="menuitem">
                <a href="/profile"><i class="profile-icon"></i> View Profile</a>
              </li>
              <li role="menuitem">
                <a href="/logout"><i class="logout-icon"></i> Log Out</a>
              </li>
            </ul>
          </div>
        </nav>
      </div>
    </header>

    <main>
      <div class="chat-container">
        <div class="contacts-panel">
          <h2>Contacts</h2>
          <div class="search-container">
            <input
              type="text"
              id="search-input"
              placeholder="Search students/investors..."
            />
            <div id="search-results" class="search-results"></div>
          </div>
          <ul class="contacts-list"></ul>
        </div>
        <div class="chat-panel">
          <div class="chat-header">
            <img
              id="chat-avatar"
              src="assets/icons/default-image.png"
              alt="Chat Avatar"
            />
            <h2 id="chat-with">Select a contact</h2>
          </div>
          <div class="chat-messages"></div>
          <div class="chat-input">
            <input
              type="text"
              id="message-input"
              placeholder="Write a message..."
            />
            <button id="send-button">Send</button>
          </div>
        </div>
      </div>
    </main>

    <footer class="qwerty">
      <p>&copy; 2024 InsightHub. All rights reserved.</p>
    </footer>

    <!---
    <script src="assets/js/frontend-chat-service.js"></script>
    <script src="assets/js/chat.js"></script> 
    -->
  </body>
</html>
