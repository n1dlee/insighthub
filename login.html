<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>InsightHub - Login</title>
    <link rel="stylesheet" href="./assets/css/styles.css" />
    <script src="assets/js/languages.js" defer></script>
  </head>
  <body>
    <header>
      <div class="hcontainer">
        <a class="h1-style" href="/"><h1>InsightHub</h1></a>
      </div>
    </header>

    <div class="login-container">
      <div class="login-card">
        <h2 class="sign_in1" data-translate="sign_in">Sign in</h2>
        <div class="type_acccc">
          <p class="account_type" data-translate="type_acc">
            Which type of account do you<br />want to sign in to?
        </p>
        </div>
        <button onclick="location.href='/login-student'" data-translate="student">Student</button>
        <button onclick="location.href='/login-investor'" data-translate="investor">Investor</button>
        <div class="dotted-line"></div>
        <p class="no-account" data-translate="no_account">Don't have an account?</p>
        <a href="/register" class="create-account" data-translate="account">Create Account</a>
      </div>
    </div>
  </body>
</html>
