<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Edit Profile - InsightHub</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Poppins:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="assets/css/styles.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.12/cropper.min.css"
    />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.12/cropper.min.js"></script>
  </head>
  <body>
    <div id="loading-indicator"></div>
    <header>
      <div class="hcontainer">
        <a class="h1-style" href="/investor-main"><h1>InsightHub</h1></a>
        <nav class="icon-bar">
          <div class="user-profile-wrapper" aria-haspopup="true">
            <div class="user-profile">
              <img src="assets/icons/default-image.png" alt="User Profile" />
            </div>
            <ul class="dropdown-menu" role="menu" aria-hidden="true">
              <li role="menuitem">
                <h2 id="loading-student-name">Loading...</h2>
              </li>
              <li role="menuitem">
                <a href="/investor-profile"
                  ><i class="profile-icon"></i> View Profile</a
                >
              </li>
              <li role="menuitem">
                <a href="/logout"><i class="logout-icon"></i> Log Out</a>
              </li>
            </ul>
          </div>
        </nav>
      </div>
    </header>

    <div class="edit-profile-container">
      <form id="profileEditForm" enctype="multipart/form-data">
        <label for="profileImage">Profile Image:</label>
        <input
          type="file"
          id="profileImage"
          name="profileImage"
          accept="image/png, image/jpeg, image/jpg"
        />

        <div id="image-preview-container" style="display: none">
          <img id="image-preview" src="" alt="Image Preview" />
          <div id="crop-controls">
            <button type="button" id="crop-button">Crop & Save</button>
          </div>
        </div>

        <div class="name-address">
          <label for="name">Name:</label>
          <input type="text" id="name" name="name" />
          <label for="surname">Surname:</label>
          <input type="text" id="surname" name="surname" />
        </div>

        <label for="location">Location:</label>
        <input type="text" id="location" name="location" />

        <label for="bio">Bio:</label>
        <textarea id="bio" name="bio"></textarea>

        <div class="work-history">
          <label>Work History:</label>
          <div id="work-history-entries"></div>
          <button type="button" id="add-work-history">Add Work History</button>
        </div>

        <div class="work-experience">
          <label>Work Experience:</label>
          <div id="work-experience-entries"></div>
          <button type="button" id="add-work-experience">
            Add Work Experience
          </button>
        </div>

        <button type="submit">Save</button>
        <a href="/investor-profile" class="discard-button">Back To Profile</a>
      </form>
    </div>

    <script src="assets/js/investor-image-crop.js"></script>
    <script src="assets/js/investor-profile-edit.js"></script>
  </body>
</html>
