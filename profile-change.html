<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Edit Profile - InsightHub</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Poppins:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="assets/css/styles.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.12/cropper.min.css"
    />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.12/cropper.min.js"></script>
  </head>
  <body>
    <div id="loading-indicator"></div>
    <header>
      <div class="hcontainer">
        <a class="h1-style" href="/main"><h1>InsightHub</h1></a>
        <nav class="icon-bar">
          <div class="user-profile-wrapper" aria-haspopup="true">
            <div class="user-profile">
              <img src="assets/icons/default-image.png" alt="User Profile" />
            </div>
            <ul class="dropdown-menu" role="menu" aria-hidden="true">
              <li role="menuitem">
                <h2 id="loading-student-name">Loading...</h2>
              </li>
              <li role="menuitem">
                <a href="/profile"><i class="profile-icon"></i> View Profile</a>
              </li>
              <li role="menuitem">
                <a href="/logout"><i class="logout-icon"></i> Log Out</a>
              </li>
            </ul>
          </div>
        </nav>
      </div>
    </header>

    <div class="edit-profile-container">
      <form id="profileEditForm" enctype="multipart/form-data">
        <label for="profileImage">Profile Image:</label>
        <input
          type="file"
          id="profileImage"
          name="profileImage"
          accept="image/png, image/jpeg, image/jpg"
        />
        <div id="image-preview-container" style="display: none">
          <img id="image-preview" src="" alt="Image Preview" />
          <div id="crop-controls">
            <button id="crop-button">Crop & Save</button>
          </div>
        </div>

        <div class="name-address">
          <label for="name">Name:</label>
          <h1 id="name">Name</h1>
          <label for="surname">Surname:</label>
          <h1 id="surname">Surname</h1>
          <br /><br />
        </div>

        <label for="location">Location:</label>
        <input type="text" id="location" name="location" />

        <label for="education">Education:</label>
        <span id="education"></span>
        <br />

        <label for="major">Major:</label>
        <select id="major" name="major">
          <!-- Options will be dynamically loaded here -->
        </select>

        <label for="gpa">GPA:</label>
        <select id="gpa" name="gpa">
          <option value="5.0">5.0</option>
          <option value="4.9">4.9</option>
          <option value="4.8">4.8</option>
          <option value="4.7">4.7</option>
          <option value="4.6">4.6</option>
          <option value="4.5">4.5</option>
          <option value="4.4">4.4</option>
          <option value="4.3">4.3</option>
          <option value="4.4">4.4</option>
          <option value="4.3">4.3</option>
          <option value="4.2">4.2</option>
          <option value="4.1">4.1</option>
          <option value="4.0">4.0</option>
          <option value="below 4">below 4.0</option>
        </select>

        <label for="sat">What is your SAT Score?</label>
        <select id="sat" name="sat">
          <option value="1600">1600</option>
          <option value="1590">1590</option>
          <option value="1580">1580</option>
          <option value="1570">1570</option>
          <option value="1560">1560</option>
          <option value="1550">1550</option>
          <option value="1540">1540</option>
          <option value="1530">1530</option>
          <option value="1520">1520</option>
          <option value="1510">1510</option>
          <option value="1500">1500</option>
          <option value="1490">1490</option>
          <option value="1480">1480</option>
          <option value="1470">1470</option>
          <option value="1460">1460</option>
          <option value="1450">1450</option>
          <option value="1440">1440</option>
          <option value="1430">1430</option>
          <option value="1420">1420</option>
          <option value="1410">1410</option>
          <option value="1400">1400</option>
          <option value="1390">1390</option>
          <option value="1380">1380</option>
          <option value="1370">1370</option>
          <option value="1360">1360</option>
          <option value="1350">1350</option>
          <option value="1340">1340</option>
          <option value="1330">1330</option>
          <option value="1320">1320</option>
          <option value="1310">1310</option>
          <option value="1300">1300</option>
          <option value="below 1300">below 1300</option>
        </select>

        <label for="ielts">IELTS:</label>
        <select id="ielts" name="ielts">
          <option value="9">9</option>
          <option value="8.5">8.5</option>
          <option value="8">8</option>
          <option value="7.5">7.5</option>
          <option value="7">7</option>
          <option value="6.5">6.5</option>
          <option value="6">6</option>
          <option value="5.5">5.5</option>
          <option value="5">5</option>
          <option value="below 5">below 5</option>
        </select>

        <label for="achievements">Achievements:</label>
        <textarea id="achievements" name="achievements"></textarea>

        <label for="Bio">Bio:</label>
        <textarea id="bio" name="bio"></textarea>

        <button type="submit">Save</button>
        <button type="discard">Back To Profile</button>
      </form>
    </div>
    <script src="assets/js/image-crop.js"></script>
    <script src="assets/js/profile-edit.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios@0.21.1/dist/axios.min.js"></script>
  </body>
</html>
